server:
  port: 8082
  mode: debug

# gRPC 服务配置
grpc:
  port: 50051
  max_concurrent_streams: 1000
  connection_timeout: 10s
  keepalive_time: 60s
  keepalive_timeout: 20s

# 微服务配置
services:
  user:
    host: localhost
    port: 50053
  product:
    host: localhost
    port: 50052

database:
  host: localhost
  port: 3306
  username: root
  password: root
  database: mall

rabbitmq:
  url: amqp://guest:guest@localhost:5672/
  exchange: mall_exchange

jwt:
  secret: f4b0b7d012714f9ea8af16bd9c950f2b
  expiration: 24h

redis:
  host: localhost
  port: 6379
  password: 
  db: 0

logging:
  level: debug
  format: json
  output: stdout

trace:
  enabled: true
  provider: jaeger
  jaeger:
    serviceName: order-service
    hostPort: localhost:6831
    logSpans: true

metrics:
  enabled: true
  provider: prometheus
  prometheus:
    path: /metrics
    port: 9090