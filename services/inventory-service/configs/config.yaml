server:
  http_port: 8060
  grpc_port: 18060
  mode: debug # debug, release, test
  timeout: 30 # seconds

database:
  driver: mysql
  host: localhost
  port: 3306
  username: root
  password: root
  dbname: mall_go
  max_open_conns: 100
  max_idle_conns: 10
  conn_max_lifetime: 3600 # seconds

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0
  pool_size: 100
  min_idle_conns: 10

registry:
  type: consul
  address: localhost:8500
  service_name: inventory-service
  tags:
    - inventory
    - mall

rabbitmq:
  host: localhost
  port: 5672
  username: guest
  password: guest
  vhost: /

services:
  product:
    host: localhost
    port: 18030
    timeout: 5 # seconds

logging:
  level: info # debug, info, warn, error
  format: json # json, text
  output: stdout # stdout, file
  file_path: ./logs/inventory-service.log

tracing:
  enabled: true
  type: jaeger
  service_name: inventory-service
  endpoint: http://localhost:14268/api/traces
