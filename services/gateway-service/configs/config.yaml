server:
  port: 8000
  mode: debug # debug, release, test

auth:
  jwt_secret: 5gKYk2VZ4fW3bH6jPt8vNxrJqSaL1cEm
  token_expiry: 86400 # seconds (24 hours)

registry:
  type: consul
  address: localhost:8500
  service_name: gateway-service
  tags:
    - gateway
    - api

services:
  user:
    name: user-service
    timeout: 5 # seconds
  product:
    name: product-service
    timeout: 5 # seconds
  order:
    name: order-service
    timeout: 5 # seconds
  cart:
    name: cart-service
    timeout: 5 # seconds
  inventory:
    name: inventory-service
    timeout: 5 # seconds
  payment:
    name: payment-service
    timeout: 5 # seconds
  search:
    name: search-service
    timeout: 10 # seconds (search might take longer)
  promotion:
    name: promotion-service
    timeout: 5 # seconds
  content:
    name: content-service
    timeout: 5 # seconds
  notification:
    name: notification-service
    timeout: 5 # seconds
  recommendation:
    name: recommendation-service
    timeout: 8 # seconds (AI recommendations might take longer)
  admin:
    name: admin-service
    timeout: 5 # seconds
  portal:
    name: portal-service
    timeout: 5 # seconds
  auth:
    name: auth-service
    timeout: 3 # seconds

rate_limit:
  enabled: true
  requests_per_second: 100
  burst_size: 50

cors:
  allowed_origins:
    - "*"
  allowed_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  allowed_headers:
    - Content-Type
    - Authorization
  allow_credentials: true
  max_age: 86400 # seconds

logging:
  level: info # debug, info, warn, error
  format: json # json, text
  output: stdout # stdout, file
  file_path: ./logs/gateway-service.log
