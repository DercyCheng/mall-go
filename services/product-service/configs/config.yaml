server:
  http_port: 8030
  grpc_port: 18030
  mode: debug # debug, release, test
  timeout: 30 # seconds
  apiPrefix: /api/v1

# gRPC 服务配置
grpc:
  max_concurrent_streams: 1000
  connection_timeout: 10
  keepalive_time: 60
  keepalive_timeout: 20

# 数据库配置
database:
  driver: mysql
  host: localhost
  port: 3306
  name: mall_go
  username: root
  password: root
  # 是否显示SQL日志
  debug: true
  # 连接池配置
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600

# 日志配置
logging:
  level: info # debug, info, warn, error
  format: json # json, text
  output: stdout # stdout, file
  file_path: ./logs/product-service.log
  max_days: 7

# JWT配置
jwt:
  # 签名密钥
  secret: mall-product-service-secret
  # 过期时间(秒)
  expire: 86400

# 注册中心配置
registry:
  # 是否开启
  enabled: false
  # 地址
  address: localhost:8500
  # 服务名称
  serviceName: product-service

# 配置中心
config:
  # 是否开启
  enabled: false
  # 地址
  address: localhost:2379
  # 配置路径前缀
  prefix: /mall/config
  # 配置文件类型
  type: yaml

# 跨域配置
cors:
  # 是否允许所有来源
  allowAllOrigins: true
  # 允许的域
  allowOrigins: []
  # 允许的方法
  allowMethods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  # 允许的请求头
  allowHeaders:
    - Origin
    - Content-Length
    - Content-Type
    - Authorization

# Redis配置
redis:
  host: localhost
  port: 6379
  password: ""
  db: 0
  pool_size: 100
  min_idle_conns: 10

# Elasticsearch配置
elasticsearch:
  addresses:
    - http://localhost:9200
  username: ""
  password: ""
  index_prefix: "mall_"

# RabbitMQ配置
rabbitmq:
  host: localhost
  port: 5672
  username: guest
  password: guest
  vhost: /

# 消息队列配置
mq:
  # 是否开启
  enabled: false
  # 类型 rabbitmq/kafka/nsq
  type: rabbitmq
  # RabbitMQ配置
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    vhost: /
