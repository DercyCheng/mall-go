server:
  http_port: 8010
  grpc_port: 18010
  mode: debug # debug, release, test
  timeout: 30 # seconds

auth:
  jwt_secret: 5gKYk2VZ4fW3bH6jPt8vNxrJqSaL1cEm
  token_expiry: 86400 # seconds (24 hours)
  refresh_token_expiry: 604800 # seconds (7 days)

database:
  driver: mysql
  host: localhost
  port: 3306
  username: root
  password: root
  dbname: mall_go
  max_open_conns: 100
  max_idle_conns: 10
  conn_max_lifetime: 3600 # seconds

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0
  pool_size: 100
  min_idle_conns: 10

registry:
  type: consul
  address: localhost:8500
  service_name: auth-service
  tags:
    - auth
    - security

logging:
  level: info # debug, info, warn, error
  format: json # json, text
  output: stdout # stdout, file
  file_path: ./logs/auth-service.log

tracing:
  enabled: true
  type: jaeger
  service_name: auth-service
  endpoint: http://localhost:14268/api/traces
